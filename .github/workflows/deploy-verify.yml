# .github/workflows/deploy-verify.yml
# Runs post-deployment smoke tests after push to main
# Verifies public pages, security headers, API health, error handling

name: Deploy Verification

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL to verify (default: https://www.woulfai.com)'
        required: false
        default: 'https://www.woulfai.com'

jobs:
  verify:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Wait for Vercel deploy
        run: sleep 30

      - name: Run deploy verification
        run: node scripts/verify-deploy.js ${{ github.event.inputs.target_url || 'https://www.woulfai.com' }}
