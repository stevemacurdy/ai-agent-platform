# .github/workflows/tenant-isolation.yml
# Runs tenant isolation tests against Supabase on push to main and PRs
# Verifies RLS policies prevent cross-tenant data access

name: Tenant Isolation Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual trigger
  workflow_dispatch:

jobs:
  tenant-isolation:
    name: RLS Isolation Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tenant isolation tests
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: node tests/tenant-isolation.test.js

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tenant-isolation-results
          path: tests/tenant-isolation.test.js
          retention-days: 30
